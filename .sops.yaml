---
creation_rules:
  # Helm values files: fully encrypted (may contain arbitrary secret structures)
  - path_regex: .*values.yaml$
    age: age1mnmvtkxyzmcfs973tm0tzypq3rgyqelww3h2w92e4navh8zx3e5q60e8wy
  # SopsSecret CRDs: encrypt only the actual secret values (stringData/data).
  # Non-sensitive fields (secretTemplate names, labels) stay readable in git.
  - path_regex: sopssecret-.*\.yaml$
    encrypted_regex: ^(stringData|data)$
    age: age1mnmvtkxyzmcfs973tm0tzypq3rgyqelww3h2w92e4navh8zx3e5q60e8wy
  # Standard Kubernetes manifests: encrypt only data/stringData fields
  - path_regex: .*.yaml
    encrypted_regex: ^(data|stringData)$
    age: age1mnmvtkxyzmcfs973tm0tzypq3rgyqelww3h2w92e4navh8zx3e5q60e8wy
