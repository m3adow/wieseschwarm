---
repos:
  ### Pre-Commit Hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: no-commit-to-branch
        args: [--branch, main]
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
      - id: remove-crlf
      - id: forbid-tabs
      - id: remove-tabs
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.32.0
    hooks:
      - args:
          - --config-file
          - .github/yamllint.yaml
        id: yamllint
  - repo: https://github.com/onedr0p/sops-pre-commit
    rev: v2.1.1
    hooks:
      - id: forbid-secrets
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.218.0
    hooks:
      - id: renovate-config-validator
        args: [--strict]
  ### Pre-Push Hooks
  - repo: https://github.com/Agilicus/pre-commit-hook-k8svalidate.git
    rev: v0.2.0
    hooks:
      - id: k8svalidate
        args: [--exclude, "**/*-patch.yaml"]
        files: .yaml$
        stages: ["pre-push"]
  # Local hook instead of the upstream kube-linter-docker hook: upstream
  # hardcodes a stale image tag in its entry (v0.6.4), independent of the
  # pinned rev. The tag below is tracked by a Renovate regex manager.
  # require_serial keeps all files in one invocation so cross-resource
  # checks (e.g. dangling-service) see Services and Deployments together.
  - repo: local
    hooks:
      - id: kube-linter
        name: kube-linter
        language: docker_image
        entry: stackrox/kube-linter:v0.8.3 lint
        files: ^kubernetes/.*\.yaml$
        exclude: -patch[-.]
        require_serial: true
        stages: ["pre-push"]

