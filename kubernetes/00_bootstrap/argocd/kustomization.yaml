kind: Kustomization

namespace: argocd

resources:
  - namespace-argocd.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.3/manifests/install.yaml
  - ingressroute-argocd.yaml
  - sopssecret-apps-repo.yaml

patches:
  - path: configmap-patch-argocd-accounts.yaml
  - path: configmap-patch-argocd-cm.yaml
  - path: configmap-patch-argocd-cmd-params-cm.yaml
  - path: configmap-patch-argocd-rbac.yaml
