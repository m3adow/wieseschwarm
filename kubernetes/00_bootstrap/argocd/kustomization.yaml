---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.3/manifests/install.yaml
  - ingressroute-argocd.yaml
  - sopssecret-apps-repo.yaml

patches:
  - path: argocd-server-insecure-patch.yaml
  - path: argocd-accounts-patch.yaml
  - path: argocd-rbac-patch.yaml
  - path: argocd-repo-server-no-submodules-patch.yaml
  - path: argocd-reloader-annotations-patch.yaml
    target:
      kind: Deployment
      name: "^(argocd-dex-server|argocd-notifications-controller|argocd-repo-server|argocd-server)$"
