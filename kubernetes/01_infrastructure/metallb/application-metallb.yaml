---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    targetRevision: "0.16.x"
    helm:
      releaseName: metallb
      values: |
        speaker:
          # All nodes are control-plane; Kubernetes auto-labels them with
          # node.kubernetes.io/exclude-from-external-load-balancers, which
          # MetalLB respects by default. Override so L2 announcement works.
          ignoreExcludeLB: true
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        # frr-k8s-statuscleaner requires hostNetwork and hostPort — blocked by baseline
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    syncOptions:
      - CreateNamespace=true
