---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-pods
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: grafana-alloy
spec:
  groups:
    - name: pods.warning
      interval: 5m
      rules:
        - alert: PodHighRestartRate
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Pod {{ $labels.namespace }}/{{ $labels.pod }}
              restarting > 1/min over 15m

    - name: pods.critical
      interval: 1m
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: >-
              Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping

        - alert: PodStuck
          expr: |
            kube_pod_status_phase{phase!~"Running|Succeeded",namespace!="kube-system"} == 1
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: >-
              Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck in {{ $labels.phase }}
