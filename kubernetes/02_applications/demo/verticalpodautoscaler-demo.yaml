---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: demo
  namespace: demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    # The VPA updater refuses to evict workloads below 2 replicas by default
    # (--min-replicas=2). Without this, the Recreate fallback never applies to
    # the single-replica demo Deployment. In-place resize is always attempted
    # first; eviction only occurs when in-place is not possible.
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: nginx
        minAllowed:
          cpu: 10m
          memory: 16Mi
        maxAllowed:
          cpu: 200m
          memory: 128Mi
      - containerName: metrics
        minAllowed:
          cpu: 5m
          memory: 16Mi
        maxAllowed:
          cpu: 100m
          memory: 64Mi
